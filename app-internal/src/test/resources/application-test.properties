# H2 in-memory for tests (PostgreSQL 호환 모드)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Redis: 테스트에서 비활성화 (MockBean 사용)
spring.data.redis.host=localhost
spring.data.redis.port=16379

# Spring AI: 테스트에서 mock (Ollama 서버 불필요)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:7b-instruct-q4_K_M
spring.ai.ollama.embedding.options.model=bge-m3

rag.sync.discord-webhook-url=
# ADR-0011: 테스트용 JWT 시크릿 (32바이트 이상)
rag.auth.jwt-secret=test-secret-key-for-unit-testing-only-32bytes

# 멀티 데이터소스 암호화 키 (테스트 전용 — 32바이트 Base64)
rag.datasource.enc-key=dGVzdGtleV90ZXN0a2V5X3Rlc3RrZXlfdGVzdGtleV8=

# M8: Mail 설정 (테스트에서 SMTP 연결 안 함)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
