<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시스템 상태 — RAG 서비스</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111; min-height: 100vh; }
    .header { background: #1e40af; color: white; padding: 24px 32px; }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .header p { font-size: 0.875rem; opacity: 0.8; margin-top: 4px; }
    .container { max-width: 680px; margin: 40px auto; padding: 0 24px; }
    .overall { display: flex; align-items: center; gap: 12px; padding: 20px 24px; border-radius: 12px; margin-bottom: 28px; font-size: 1.125rem; font-weight: 600; }
    .overall.up { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .overall.down { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .overall.loading { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; }
    .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .dot.up { background: #22c55e; box-shadow: 0 0 0 3px #86efac; }
    .dot.down { background: #ef4444; box-shadow: 0 0 0 3px #fca5a5; }
    .dot.loading { background: #9ca3af; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .components { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; }
    .comp-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #f3f4f6; }
    .comp-row:last-child { border-bottom: none; }
    .comp-name { font-weight: 500; }
    .comp-sub { font-size: 0.75rem; color: #9ca3af; margin-top: 2px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge.up { background: #dcfce7; color: #166534; }
    .badge.down { background: #fee2e2; color: #991b1b; }
    .badge.loading { background: #f3f4f6; color: #6b7280; }
    .refresh { font-size: 0.75rem; color: #9ca3af; margin-top: 16px; text-align: center; }
    .last-updated { font-size: 0.75rem; color: #6b7280; text-align: center; margin-top: 8px; }
    .error-detail { font-size: 0.7rem; color: #dc2626; margin-top: 4px; font-family: monospace; }
  </style>
</head>
<body>
<div class="header">
  <h1>시스템 상태</h1>
  <p>RAG 서비스 컴포넌트 실시간 상태</p>
</div>

<div class="container">
  <div class="overall loading" id="overall">
    <div class="dot loading" id="overallDot"></div>
    <span id="overallText">상태 확인 중...</span>
  </div>

  <div class="components">
    <div class="comp-row">
      <div>
        <div class="comp-name">PostgreSQL (pgvector)</div>
        <div class="comp-sub">벡터 검색 데이터베이스</div>
        <div class="error-detail" id="postgresError"></div>
      </div>
      <span class="badge loading" id="postgresBadge">확인 중</span>
    </div>
    <div class="comp-row">
      <div>
        <div class="comp-name">Redis</div>
        <div class="comp-sub">캐시 · 세션 · Rate Limit</div>
        <div class="error-detail" id="redisError"></div>
      </div>
      <span class="badge loading" id="redisBadge">확인 중</span>
    </div>
    <div class="comp-row">
      <div>
        <div class="comp-name">Ollama LLM</div>
        <div class="comp-sub">qwen2.5:14b · qwen2.5-vl:7b</div>
        <div class="error-detail" id="ollamaError"></div>
      </div>
      <span class="badge loading" id="ollamaBadge">확인 중</span>
    </div>
  </div>

  <div class="refresh">30초마다 자동 갱신</div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
const COMPS = ['postgres', 'redis', 'ollama'];

async function fetchStatus() {
  try {
    const r = await fetch('/api/v1/health/deep');
    const d = await r.json();

    const allUp = d.overall === 'UP';
    const overall = document.getElementById('overall');
    const dot = document.getElementById('overallDot');
    const text = document.getElementById('overallText');

    overall.className = 'overall ' + (allUp ? 'up' : 'down');
    dot.className = 'dot ' + (allUp ? 'up' : 'down');
    text.textContent = allUp ? '모든 시스템 정상 운영 중' : '일부 시스템에 문제가 발생했습니다';

    COMPS.forEach(key => {
      const comp = d[key] || {};
      const status = (comp.status || 'UNKNOWN').toUpperCase();
      const isUp = status === 'UP';
      const badge = document.getElementById(key + 'Badge');
      badge.className = 'badge ' + (isUp ? 'up' : 'down');
      badge.textContent = isUp ? '정상' : status;
      const errEl = document.getElementById(key + 'Error');
      if (errEl) errEl.textContent = comp.error ? comp.error.slice(0, 80) : '';
    });

    document.getElementById('lastUpdated').textContent =
      '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR');
  } catch (e) {
    document.getElementById('overall').className = 'overall down';
    document.getElementById('overallDot').className = 'dot down';
    document.getElementById('overallText').textContent = 'API 서버에 연결할 수 없습니다';
  }
}

fetchStatus();
setInterval(fetchStatus, 30000);
</script>
</body>
</html>
