# RagVault žā¨Žāī ÍįúŽįú žĄúŽ≤Ą ŪôėÍ≤Ĺ
# žā¨Žāī Ollama žĄúŽ≤ĄŽ•ľ žā¨žö©ŪēėŽĮÄŽ°ú Ž°úžĽ¨ Ollama žĽ®ŪÖĆžĚīŽĄą žóÜžĚĆ.
# žā¨ž†Ą ž§ÄŽĻĄ: žā¨Žāī Ollama žĄúŽ≤ĄžóźžĄú `ollama pull bge-m3` žč§ŪĖČ ŪēĄžöĒ.
#
# Usage:
#   cp .env.internal.example .env.internal
#   # .env.internal žóź INTERNAL_OLLAMA_BASE_URL ŽďĪ žĪĄžöįÍłį
#   docker compose -f docker-compose.internal.yml --env-file .env.internal up -d

services:

  # žļźžčú / Ž∂Ąžāį ŽĚĹ (ShedLock)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Spring Boot RAG ŽįĪžóĒŽďú
  rag-backend:
    image: rag-backend:latest
    build:
      context: ./rag-backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: internal
      # žôłŽ∂Ä PostgreSQL (pgvector) žĄúŽ≤Ą
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URLŽ•ľ .env.internalžóź žĄ§ž†ēŪēėžĄłžöĒ}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-raguser}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORDŽ•ľ .env.internalžóź žĄ§ž†ēŪēėžĄłžöĒ}"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # žā¨Žāī Ollama žĄúŽ≤Ą (Ž°úžĽ¨ žĽ®ŪÖĆžĚīŽĄą žóÜžĚĆ)
      INTERNAL_OLLAMA_BASE_URL: "${INTERNAL_OLLAMA_BASE_URL:?INTERNAL_OLLAMA_BASE_URLŽ•ľ .env.internalžóź žĄ§ž†ēŪēėžĄłžöĒ (žėą: http://192.168.x.x:11434)}"
      INTERNAL_CHAT_MODEL: ${INTERNAL_CHAT_MODEL:-qwen3:8b}
      INTERNAL_EMBEDDING_MODEL: ${INTERNAL_EMBEDDING_MODEL:-bge-m3}
      INTERNAL_VLM_MODEL: ${INTERNAL_VLM_MODEL:-qwen3:8b}
      # žôłŽ∂Ä Í≥†ÍįĚžā¨ MySQL žĄúŽ≤Ą
      INTERNAL_MYSQL_HOST: "${INTERNAL_MYSQL_HOST:?INTERNAL_MYSQL_HOSTŽ•ľ .env.internalžóź žĄ§ž†ēŪēėžĄłžöĒ}"
      INTERNAL_MYSQL_PORT: ${INTERNAL_MYSQL_PORT:-3306}
      INTERNAL_MYSQL_DATABASE: ${INTERNAL_MYSQL_DATABASE:-customer_sample}
      INTERNAL_MYSQL_USERNAME: ${INTERNAL_MYSQL_USERNAME:-raguser}
      INTERNAL_MYSQL_PASSWORD: "${INTERNAL_MYSQL_PASSWORD:?INTERNAL_MYSQL_PASSWORDŽ•ľ .env.internalžóź žĄ§ž†ēŪēėžĄłžöĒ}"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      RAG_HYBRID_TIMEOUT_SEC: "120"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Open WebUI (ADR-0006 X-User-* Ūó§ŽćĒ, ADR-0009 /auth/verify)
  open-webui:
    image: open-webui:latest
    build:
      context: ./open-webui-fork
      dockerfile: Dockerfile
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      RAG_BACKEND_URL: http://rag-backend:8080
      RAG_BACKEND_API_KEY: "${RAG_BACKEND_API_KEY:?RAG_BACKEND_API_KEYŽ•ľ .env.internalžóź žĄ§ž†ēŪēėžĄłžöĒ}"
      OPENAI_API_BASE_URL: http://rag-backend:8080/v1
      OPENAI_API_KEY: ${RAG_BACKEND_API_KEY}
      ENABLE_OPENAI_API: "true"
      ENABLE_OLLAMA_API: "false"
      WEBUI_SECRET_KEY: "${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEYŽ•ľ .env.internalžóź žĄ§ž†ēŪēėžĄłžöĒ}"
      WEBUI_NAME: "RagVault Internal"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      rag-backend:
        condition: service_healthy
    networks:
      - rag-net
    restart: unless-stopped

volumes:
  redis_data:
  open_webui_data:

networks:
  rag-net:
    driver: bridge
