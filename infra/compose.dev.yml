# ragvault — 개발서버 전용 compose
#
# 이미지는 Jenkins가 빌드 후 전송 — 개발서버에서 직접 빌드하지 않음
# build: 섹션 없음. Jenkins가 docker save | ssh docker load 로 이미지를 전달함
#
# 사전 준비 (최초 1회):
#   docker network create rag-net
#   cp infra/.env.dev.example infra/.env.dev  # 값 채워 넣기
#
# 전체 스택 기동:
#   docker compose -f infra/compose.dev.yml --env-file infra/.env.dev up -d
#
# 개별 서비스 재시작 (이미지 전송 후):
#   docker compose -f infra/compose.dev.yml --env-file infra/.env.dev up -d --no-deps <service>

services:

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      WIDGET_DB_PASSWORD: ${WIDGET_DB_PASSWORD:-widget}
    ports:
      - "35432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    networks:
      - rag-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8888:8080"
    volumes:
      - ./internal/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # 챗 백엔드 — 18090:8080
  app-internal:
    image: app-internal:latest
    container_name: app-internal
    ports:
      - "18090:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:8076
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgvector:5432/ragdb
      SPRING_DATASOURCE_USERNAME: raguser
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-ragpassword}
      RAG_AUTH_JWT_SECRET: ${RAG_AUTH_JWT_SECRET:?RAG_AUTH_JWT_SECRET 를 설정하세요 (openssl rand -hex 32)}
      RAG_DATASOURCE_ENC_KEY: ${RAG_DATASOURCE_ENC_KEY:?RAG_DATASOURCE_ENC_KEY 를 설정하세요 (openssl rand -base64 32)}
      BOOTSTRAP_SUPER_ADMIN_EMAIL: ${BOOTSTRAP_SUPER_ADMIN_EMAIL:-admin@dev.local}
      BOOTSTRAP_INITIAL_PASSWORD: ${BOOTSTRAP_INITIAL_PASSWORD:-changeme123}
      BOOTSTRAP_API_KEY: ${RAG_BACKEND_API_KEY:-dev-api-key-change-in-prod}
      RAG_HYBRID_TIMEOUT_SEC: "600"
      RAG_SEARXNG_URL: http://searxng:8080
      RAG_CHAT_MODEL: qwen3:8b
      RAG_VLM_MODEL: ""
      RAG_KNOWLEDGE_VISION_MODEL: ""
    volumes:
      - internal_knowledge_data:/app/knowledge-internal
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # 챗 프론트엔드 — 18080:80
  rag-frontend:
    image: rag-frontend:latest
    container_name: rag-frontend
    ports:
      - "18080:80"
    depends_on:
      app-internal:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # 위젯 백엔드 — 18091:8081
  app-widget:
    image: app-widget:latest
    container_name: app-widget
    ports:
      - "18091:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WIDGET_DB_URL: jdbc:postgresql://pgvector:5432/widget_db
      WIDGET_DB_USERNAME: widget
      WIDGET_DB_PASSWORD: ${WIDGET_DB_PASSWORD:-widget}
      OLLAMA_BASE_URL: http://host.docker.internal:8076
      WIDGET_AUTH_JWT_SECRET: ${WIDGET_AUTH_JWT_SECRET:?WIDGET_AUTH_JWT_SECRET 를 설정하세요 (openssl rand -hex 32)}
      WIDGET_ENCRYPTION_KEY: ${WIDGET_ENCRYPTION_KEY:?WIDGET_ENCRYPTION_KEY 를 설정하세요 (openssl rand -base64 32)}
      WIDGET_ALLOWED_SITE_KEYS: ${WIDGET_ALLOWED_SITE_KEYS:-pk_test_widget_dev}
      WIDGET_CORS_ORIGINS: ${WIDGET_CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      WIDGET_ADMIN_CORS_ORIGINS: ${WIDGET_ADMIN_CORS_ORIGINS:-http://localhost:5173}
      WIDGET_CHAT_MODEL: ${WIDGET_CHAT_MODEL:-qwen3:8b}
      WIDGET_VISION_MODEL: ${WIDGET_VISION_MODEL:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@widget.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-changeme123}
    volumes:
      - widget_knowledge_data:/app/knowledge
    depends_on:
      pgvector:
        condition: service_healthy
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # 위젯 어드민 프론트엔드 — 18082:80
  widget-admin:
    image: widget-admin:latest
    container_name: widget-admin
    ports:
      - "18082:80"
    depends_on:
      app-widget:
        condition: service_healthy
    networks:
      - rag-net
    restart: unless-stopped

  # 위젯 임베드 데모 — 18083:80
  widget-demo:
    image: nginx:alpine
    container_name: widget-demo
    ports:
      - "18083:80"
    volumes:
      - ../frontend/widget-embed:/usr/share/nginx/html:ro
      - ./widget/nginx/widget-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-widget:
        condition: service_healthy
    networks:
      - rag-net
    restart: unless-stopped

volumes:
  pgvector_data:
  redis_data:
  internal_knowledge_data:
  widget_knowledge_data:

networks:
  rag-net:
    external: true
