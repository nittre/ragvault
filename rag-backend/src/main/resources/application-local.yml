spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: raguser
    password: ${SPRING_DATASOURCE_PASSWORD:-ragpassword}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b-instruct-q4_K_M
      embedding:
        options:
          model: bge-m3

server:
  error:
    include-message: always

rag:
  mysql:
    host: localhost
    port: 3306
    database: customer_sample
    username: raguser
    password: ${MYSQL_PASSWORD:-ragpassword}
