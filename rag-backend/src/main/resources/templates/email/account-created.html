<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 40px auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .header { background: #1e40af; padding: 32px; text-align: center; }
    .header h1 { color: white; font-size: 1.25rem; margin: 0; }
    .body { padding: 32px; }
    .body p { color: #374151; line-height: 1.6; margin: 0 0 16px; }
    .key-box { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px 20px; margin: 20px 0; font-family: monospace; font-size: 1rem; color: #1e40af; word-break: break-all; }
    .btn { display: inline-block; background: #1e40af; color: white; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; margin: 8px 0; }
    .footer { padding: 20px 32px; background: #f9fafb; text-align: center; font-size: 0.75rem; color: #9ca3af; }
    .warning { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 8px; padding: 12px 16px; color: #92400e; font-size: 0.875rem; margin: 16px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>RAG 서비스 계정이 발급되었습니다</h1>
  </div>
  <div class="body">
    <p>안녕하세요, <strong th:text="${userName}">사용자</strong>님.</p>
    <p><strong th:text="${companyName}">회사</strong> RAG 서비스에 오신 것을 환영합니다. 아래 API Key로 서비스에 접속하실 수 있습니다.</p>

    <div class="key-box" th:text="${apiKey}">rk_xxxxxxxxxxxx</div>

    <div class="warning">
      이 API Key는 이메일로 발송된 후 다시 확인할 수 없습니다. 안전한 곳에 보관하세요.
    </div>

    <p><strong>서비스 접속 URL:</strong></p>
    <a class="btn" th:href="${serviceUrl}" href="#">서비스 접속하기</a>

    <p style="margin-top: 24px;"><strong>계정 정보</strong></p>
    <table style="width:100%; border-collapse:collapse; font-size:.875rem;">
      <tr><td style="padding:6px 0; color:#6b7280;">이메일</td><td th:text="${userEmail}">user@example.com</td></tr>
      <tr><td style="padding:6px 0; color:#6b7280;">Scope</td><td th:text="${scope}">api:chat</td></tr>
      <tr><td style="padding:6px 0; color:#6b7280;">만료일</td><td th:text="${expiresAt}">2027-05-28</td></tr>
    </table>
  </div>
  <div class="footer">
    문의: <a th:href="'mailto:' + ${supportEmail}" style="color:#1e40af;" th:text="${supportEmail}">support@ragservice.com</a><br/>
    &copy; RAG SaaS &mdash; 이 메일은 자동으로 발송되었습니다.
  </div>
</div>
</body>
</html>
