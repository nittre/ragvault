<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 40px auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .header { background: #dc2626; padding: 32px; text-align: center; }
    .header h1 { color: white; font-size: 1.25rem; margin: 0; }
    .body { padding: 32px; }
    .body p { color: #374151; line-height: 1.6; margin: 0 0 16px; }
    .btn { display: inline-block; background: #dc2626; color: white; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; margin: 8px 0; }
    .expire-note { background: #fef3c7; border-radius: 8px; padding: 12px 16px; color: #92400e; font-size: 0.875rem; margin: 16px 0; }
    .footer { padding: 20px 32px; background: #f9fafb; text-align: center; font-size: 0.75rem; color: #9ca3af; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>비밀번호 재설정 요청</h1>
  </div>
  <div class="body">
    <p>안녕하세요, <strong th:text="${userName}">사용자</strong>님.</p>
    <p>비밀번호 재설정 요청이 접수되었습니다. 아래 버튼을 클릭하여 비밀번호를 변경하세요.</p>

    <a class="btn" th:href="${resetUrl}" href="#">비밀번호 재설정하기</a>

    <div class="expire-note">
      이 링크는 <strong th:text="${expireMinutes}">30</strong>분 후 만료됩니다.
    </div>

    <p style="font-size:.875rem; color:#6b7280;">
      본인이 요청하지 않은 경우 이 메일을 무시하세요. 비밀번호는 변경되지 않습니다.
    </p>
  </div>
  <div class="footer">
    요청 IP: <span th:text="${requestIp}">0.0.0.0</span> &middot; <span th:text="${requestTime}">2026-05-28 18:00</span><br/>
    문의: <a th:href="'mailto:' + ${supportEmail}" style="color:#dc2626;" th:text="${supportEmail}">support@ragservice.com</a>
  </div>
</div>
</body>
</html>
