# H2 in-memory for tests (PostgreSQL 호환 모드)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Redis: 테스트에서 비활성화 (MockBean 사용)
spring.data.redis.host=localhost
spring.data.redis.port=16379

# Spring AI: 테스트에서 mock (Ollama 서버 불필요)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen2.5:7b-instruct-q4_K_M
spring.ai.ollama.embedding.options.model=bge-m3

# M2 추가: MySQL 설정 (테스트에서 실제 연결 안 함)
rag.mysql.host=localhost
rag.mysql.port=3306
rag.mysql.database=test_db
rag.mysql.username=test
rag.mysql.password=test
rag.sync.discord-webhook-url=

# M8: Mail 설정 (테스트에서 SMTP 연결 안 함)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=
spring.mail.password=
