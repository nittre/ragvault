server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — /admin/* React Router 경로는 여기서 index.html 반환
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + auth → backend (REST API만 프록시, SPA 라우트와 경로 충돌 없음)
    location /api/ {
        proxy_pass http://app-widget:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
