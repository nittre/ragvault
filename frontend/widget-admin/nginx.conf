server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — /admin/* React Router 경로는 여기서 index.html 반환
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + auth → backend (REST API만 프록시, SPA 라우트와 경로 충돌 없음)
    # resolver + 변수 조합: app-widget 컨테이너가 재시작되어 IP가 바뀌어도
    # nginx가 재시작 없이 Docker DNS(127.0.0.11)를 통해 새 IP를 재조회하도록 함
    # (정적 proxy_pass는 최초 1회만 DNS를 조회해 캐시하므로, 백엔드 재시작 시 502가 발생함)
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $widget_backend "app-widget";
        proxy_pass http://$widget_backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
