replicaCount: 1

image:
  repository: ""  # ECR 리포지터리 (배포 시 주입)
  tag: "v0.6.5-rag1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  RAG_BACKEND_URL: "http://rag-backend:8080"
  RAG_BACKEND_API_KEY: ""  # Secrets Manager에서 주입
  WEBUI_SECRET_KEY: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_FROM: ""

persistence:
  enabled: true
  storageClass: "local-path"
  size: 5Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
