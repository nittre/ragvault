# kube-prometheus-stack 커스텀 values
# 설치:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f values.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    additionalScrapeConfigs:
      - job_name: rag-backend
        static_configs:
          - targets: ['rag-backend.rag-system.svc.cluster.local:8080']
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
      - job_name: open-webui
        static_configs:
          - targets: ['open-webui.rag-system.svc.cluster.local:8080']
        metrics_path: /metrics
        scrape_interval: 30s

grafana:
  adminPassword: ""  # 배포 시 --set grafana.adminPassword=<value> 주입
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: rag
          folder: RAG
          type: file
          disableDeletion: true
          options:
            path: /var/lib/grafana/dashboards/rag
  dashboards:
    rag:
      rag-main:
        json: |
          {
            "title": "RAG 메인 대시보드",
            "uid": "rag-main",
            "refresh": "30s",
            "schemaVersion": 38,
            "version": 1,
            "panels": [
              {
                "id": 1,
                "title": "경로별 요청 수 (QPS)",
                "type": "timeseries",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
                "targets": [{
                  "expr": "rate(rag_query_total[5m])",
                  "legendFormat": "{{intent}}"
                }]
              },
              {
                "id": 2,
                "title": "경로별 에러율 (%)",
                "type": "timeseries",
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
                "targets": [{
                  "expr": "rate(rag_query_errors_total[5m]) / rate(rag_query_total[5m]) * 100",
                  "legendFormat": "{{intent}} 에러율"
                }]
              },
              {
                "id": 3,
                "title": "응답 시간 p99 (ms)",
                "type": "timeseries",
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
                "targets": [{
                  "expr": "histogram_quantile(0.99, rate(rag_query_duration_seconds_bucket[5m])) * 1000",
                  "legendFormat": "{{intent}} p99"
                }]
              },
              {
                "id": 4,
                "title": "binlog 지연 (초)",
                "type": "gauge",
                "gridPos": {"h": 8, "w": 6, "x": 12, "y": 8},
                "targets": [{
                  "expr": "rag_binlog_lag_seconds",
                  "legendFormat": "binlog lag"
                }],
                "fieldConfig": {
                  "defaults": {
                    "thresholds": {
                      "steps": [
                        {"color": "green", "value": 0},
                        {"color": "yellow", "value": 1800},
                        {"color": "red", "value": 3600}
                      ]
                    }
                  }
                }
              },
              {
                "id": 5,
                "title": "가드레일 발동 수",
                "type": "stat",
                "gridPos": {"h": 8, "w": 6, "x": 18, "y": 8},
                "targets": [{
                  "expr": "increase(rag_guardrail_triggered_total[1h])",
                  "legendFormat": "Guard {{guard}}"
                }]
              },
              {
                "id": 6,
                "title": "PII 마스킹 건수",
                "type": "stat",
                "gridPos": {"h": 4, "w": 6, "x": 0, "y": 16},
                "targets": [{
                  "expr": "increase(rag_pii_masked_total[1h])",
                  "legendFormat": "{{path}}"
                }]
              },
              {
                "id": 7,
                "title": "보안 차단 건수",
                "type": "stat",
                "gridPos": {"h": 4, "w": 6, "x": 6, "y": 16},
                "targets": [{
                  "expr": "increase(rag_query_blocked_total[1h])",
                  "legendFormat": "{{reason}}"
                }]
              }
            ]
          }
      rag-infra:
        json: |
          {
            "title": "RAG 인프라 대시보드",
            "uid": "rag-infra",
            "refresh": "1m",
            "schemaVersion": 38,
            "version": 1,
            "panels": [
              {
                "id": 1,
                "title": "PostgreSQL 연결 수",
                "type": "timeseries",
                "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0},
                "targets": [{"expr": "hikaricp_connections_active", "legendFormat": "Active"}]
              },
              {
                "id": 2,
                "title": "Redis 메모리 사용률",
                "type": "gauge",
                "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
                "targets": [{"expr": "redis_memory_used_bytes / redis_memory_max_bytes * 100", "legendFormat": "Redis MEM%"}]
              },
              {
                "id": 3,
                "title": "JVM Heap 사용률",
                "type": "timeseries",
                "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0},
                "targets": [{"expr": "jvm_memory_used_bytes{area=\"heap\"} / jvm_memory_max_bytes{area=\"heap\"} * 100", "legendFormat": "Heap%"}]
              }
            ]
          }
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'namespace']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 12h
      receiver: discord-critical
      routes:
        - match:
            severity: critical
          receiver: discord-critical
        - match:
            severity: warning
          receiver: discord-warning
    receivers:
      - name: discord-critical
        webhook_configs:
          - url: ""  # 배포 시 DISCORD_CRITICAL_WEBHOOK 주입
            send_resolved: true
            title: '[CRITICAL] {{ .GroupLabels.alertname }}'
      - name: discord-warning
        webhook_configs:
          - url: ""  # 배포 시 DISCORD_WARNING_WEBHOOK 주입
            send_resolved: true
            title: '[WARNING] {{ .GroupLabels.alertname }}'

# node-exporter — EC2 메트릭
nodeExporter:
  enabled: true

# kube-state-metrics — k3s 리소스 메트릭
kubeStateMetrics:
  enabled: true
