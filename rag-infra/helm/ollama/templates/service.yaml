apiVersion: v1
kind: Service
metadata:
  name: {{ include "ollama.fullname" . }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: ollama
      port: {{ .Values.service.port }}
      targetPort: ollama
      protocol: TCP
  selector:
    {{- include "ollama.selectorLabels" . | nindent 4 }}
