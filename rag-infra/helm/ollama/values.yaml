# Ollama Helm Chart 기본값
# GPU 노드에 배포 — nodeSelector 필수

replicaCount: 1

image:
  repository: ollama/ollama
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 11434

# GPU 노드 지정 (g5.xlarge)
nodeSelector:
  node-role: gpu

tolerations:
  - key: "gpu"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

resources:
  requests:
    cpu: "2000m"
    memory: "16Gi"
  limits:
    cpu: "8000m"
    memory: "24Gi"
    # GPU 리소스 (NVIDIA device plugin 필요)
    # nvidia.com/gpu: 1

persistence:
  enabled: true
  size: 100Gi
  storageClass: ""

# 사전 로드할 모델 (AMI 에 미리 pull 되어 있어야 함)
models:
  - qwen2.5:14b-instruct-q4_K_M
  - qwen2.5-vl:7b-instruct-q4_K_M
  - nomic-embed-text
